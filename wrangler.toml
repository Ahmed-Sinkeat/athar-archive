name = "athar-archive"
# main + the ASSETS binding + assets directory are supplied by @astrojs/cloudflare
# (see its config customizer). Setting main here to the built worker breaks the build
# because the Cloudflare vite-plugin validates it before the worker exists.
compatibility_date = "2025-01-01"
compatibility_flags = [ "nodejs_compat" ]

[observability]
enabled = true

[[d1_databases]]
binding = "SEARCH"
database_name = "athar-search"
database_id = "e504e022-1bc1-4d05-a482-e1f815c31004"
