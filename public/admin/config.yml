# Sveltia CMS config — replaces Keystatic (see docs/roadmap-plan.md Phase 1).
# GitHub-backed: every save here is a commit to this repo, same as Keystatic was.
#
# `quran` is intentionally excluded — fixed 114-entry set generated by
# scripts/epub-import.ts, not day-to-day editable.
#
# Auth: sveltia-cms-auth Worker (GitHub OAuth). Editors need write access to
# the repo. Local editing still works without it: open /admin in a Chromium
# browser via `pnpm dev` and use "Work with Local Repository".

backend:
  name: github
  repo: Ahmed-Sinkeat/athar-archive
  branch: main
  base_url: https://sveltia-cms-auth.ahmedsinkeat2002.workers.dev

local_backend: true

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: person
    label: "الأشخاص"
    folder: src/content/person
    create: true
    delete: true
    slug: "{{fields.slug}}"
    fields:
      - { label: "Slug (id) — لا تغيّره بعد النشر", name: slug, widget: string, meta: true, pattern: ["^[a-z0-9]+(--?[a-z0-9]+)*$", "lowercase a-z0-9, single/double hyphens only"], hint: "يُكتب مرة واحدة عند إنشاء مادة جديدة ويصبح رابط الصفحة. عند تعديل مادة موجودة اتركه فارغًا — لا تأثير له." }
      - { label: "العنوان", name: title, widget: string }
      - { label: "الحالة", name: status, widget: select, default: draft, options: [{ label: "مسودة", value: draft }, { label: "مراجعة", value: review }, { label: "منشور", value: published }, { label: "مؤرشف", value: archived }] }
      - { label: "تاريخ النشر", name: published_at, widget: datetime, type: date }
      - { label: "تاريخ التحديث", name: updated_at, widget: datetime, type: date, required: false }
      - { label: "روابط قديمة (تحويل 301)", name: aliases, widget: list, required: false, hint: "إذا غيّرتَ الـ slug ضَع القديم هنا، فيتحول الرابط القديم إلى الجديد تلقائيًا. ليس للعناوين البديلة." }
      - { label: "السيرة", name: bio, widget: text, required: false }
      - { label: "صورة", name: image, widget: string, required: false }
      - { label: "الميلاد", name: born, widget: string, required: false }
      - { label: "الوفاة", name: died, widget: string, required: false }
      - { label: "المكان", name: location, widget: string, required: false }
      - { label: "العصر", name: era, widget: select, required: false, options: ["الجاهلي", "صدر الإسلام", "الأموي", "العباسي", "الأندلسي", "المتأخّر", "الحديث"] }
      - { label: "الطبقة", name: tabaqa, widget: select, required: false, options: ["الصحابة", "التابعون", "أتباع التابعين", "المتقدمون", "المتوسطون", "المتأخرون", "المعاصرون"] }
      - { label: "أسماء بديلة (كُنى)", name: also_known_as, widget: list, required: false, field: { label: اسم, widget: string } }
      - { label: "العقيدة", name: aqeedah, widget: string, required: false }
      - { label: "الرتبة (جرح وتعديل)", name: rutba, widget: string, required: false }
      - { label: "الشيوخ (narrates_from)", name: narrates_from, widget: relation, required: false, multiple: true, collection: person, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "المحتوى", name: body, widget: markdown, required: false }

  # book/ is CMS-editable again via a folder split (2026-07-15): files ≥100KB
  # (whole imported book texts, 136MB total) live in src/content/book-lg/ —
  # same collection + ids (src/lib/fm-loader.ts reads both), but the CMS only
  # lists book/ (6.5MB), keeping /admin loads far below GitHub's gateway
  # timeout. validate:content FAILS the build if a ≥100KB file lands in book/.
  # subject + topic are hide: true — present only to feed relation dropdowns.

  - name: subject
    label: "التصنيفات"
    folder: src/content/subject
    hide: true
    create: true
    delete: true
    slug: "{{fields.slug}}"
    fields:
      - { label: "Slug (id) — لا تغيّره بعد النشر", name: slug, widget: string, meta: true, pattern: ["^[a-z0-9]+(--?[a-z0-9]+)*$", "lowercase a-z0-9, single/double hyphens only"], hint: "يُكتب مرة واحدة عند إنشاء مادة جديدة ويصبح رابط الصفحة. عند تعديل مادة موجودة اتركه فارغًا — لا تأثير له." }
      - { label: "العنوان", name: title, widget: string }
      - { label: "الحالة", name: status, widget: select, default: draft, options: [{ label: "مسودة", value: draft }, { label: "مراجعة", value: review }, { label: "منشور", value: published }, { label: "مؤرشف", value: archived }] }
      - { label: "تاريخ النشر", name: published_at, widget: datetime, type: date }
      - { label: "تاريخ التحديث", name: updated_at, widget: datetime, type: date, required: false }
      - { label: "روابط قديمة (تحويل 301)", name: aliases, widget: list, required: false, hint: "إذا غيّرتَ الـ slug ضَع القديم هنا، فيتحول الرابط القديم إلى الجديد تلقائيًا. ليس للعناوين البديلة." }
      - { label: "الوصف", name: description, widget: text, required: false }
      - { label: "المحتوى", name: body, widget: markdown, required: false }

  - name: topic
    label: "المواضيع"
    folder: src/content/topic
    hide: true
    create: true
    delete: true
    slug: "{{fields.slug}}"
    fields:
      - { label: "Slug (id) — لا تغيّره بعد النشر", name: slug, widget: string, meta: true, pattern: ["^[a-z0-9]+(--?[a-z0-9]+)*$", "lowercase a-z0-9, single/double hyphens only"], hint: "يُكتب مرة واحدة عند إنشاء مادة جديدة ويصبح رابط الصفحة. عند تعديل مادة موجودة اتركه فارغًا — لا تأثير له." }
      - { label: "العنوان", name: title, widget: string }
      - { label: "الحالة", name: status, widget: select, default: draft, options: [{ label: "مسودة", value: draft }, { label: "مراجعة", value: review }, { label: "منشور", value: published }, { label: "مؤرشف", value: archived }] }
      - { label: "تاريخ النشر", name: published_at, widget: datetime, type: date }
      - { label: "تاريخ التحديث", name: updated_at, widget: datetime, type: date, required: false }
      - { label: "روابط قديمة (تحويل 301)", name: aliases, widget: list, required: false, hint: "إذا غيّرتَ الـ slug ضَع القديم هنا، فيتحول الرابط القديم إلى الجديد تلقائيًا. ليس للعناوين البديلة." }
      - { label: "التصنيف الأب", name: subject, widget: relation, collection: subject, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "الوصف", name: description, widget: text, required: false }
      - { label: "المحتوى", name: body, widget: markdown, required: false }

  - name: book
    label: "الكتب"
    folder: src/content/book
    create: true
    delete: true
    slug: "{{fields.slug}}"
    fields:
      - { label: "Slug (id) — لا تغيّره بعد النشر", name: slug, widget: string, meta: true, pattern: ["^[a-z0-9]+(--?[a-z0-9]+)*$", "lowercase a-z0-9, single/double hyphens only"], hint: "يُكتب مرة واحدة عند إنشاء مادة جديدة ويصبح رابط الصفحة. عند تعديل مادة موجودة اتركه فارغًا — لا تأثير له." }
      - { label: "العنوان", name: title, widget: string }
      - { label: "الحالة", name: status, widget: select, default: draft, options: [{ label: "مسودة", value: draft }, { label: "مراجعة", value: review }, { label: "منشور", value: published }, { label: "مؤرشف", value: archived }] }
      - { label: "تاريخ النشر", name: published_at, widget: datetime, type: date }
      - { label: "تاريخ التحديث", name: updated_at, widget: datetime, type: date, required: false }
      - { label: "روابط قديمة (تحويل 301)", name: aliases, widget: list, required: false, hint: "إذا غيّرتَ الـ slug ضَع القديم هنا، فيتحول الرابط القديم إلى الجديد تلقائيًا. ليس للعناوين البديلة." }
      - { label: "المؤلف", name: person, widget: relation, required: false, collection: person, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "النوع", name: kind, widget: select, required: false, hint: "اتركْه فارغًا لكتابٍ عاديّ — «كتاب» و«فارغ» متطابقان في العرض. اختر «متن» فقط لمتونٍ حقيقيةٍ مشهورةٍ صُنِّفت للحفظ (كالأصول الثلاثة أو الآجرومية)، لا لكل رسالةٍ قصيرة.", options: ["كتاب", "متن", "مرجع", "مجموع"] }
      - { label: "القسم", name: genre, widget: select, required: false, options: ["قرآن", "حديث", "تراجم"] }
      - { label: "شرحٌ لكتاب (sharh_of)", name: sharh_of, widget: relation, required: false, collection: book, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "مختصرٌ لكتاب (mukhtasar_of)", name: mukhtasar_of, widget: relation, required: false, collection: book, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "حاشيةٌ على كتاب (hashiyah_on)", name: hashiyah_on, widget: relation, required: false, collection: book, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "نوع العمل", name: work_type, widget: select, required: false, options: ["مصدر أصلي", "متن", "منظومة", "شرح", "مختصر", "حاشية", "رسالة", "مجموع", "موسوعة", "تحقيق", "فهرس", "تفسير", "سيرة", "ديوان", "فتاوى", "قصيدة"] }
      - { label: "حالة التفريغ", name: transcript_status, widget: select, required: false, options: ["مراجَع", "قيد المراجعة"] }
      - { label: "تصنيف كتب الحديث", name: hadith_category, widget: select, required: false, options: ["امهات الكتب", "كتب الآثار", "أجزاء حديثية", "تخريج", "علل", "عام"] }
      - { label: "المواضيع", name: topics, widget: relation, required: false, multiple: true, collection: topic, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "سنة التصنيف (هجري)", name: authored_year, widget: number, required: false, value_type: int }
      - { label: "الوصف", name: description, widget: text, required: false }
      - { label: "الطبعة", name: edition, widget: string, required: false }
      - { label: "الغلاف", name: cover, widget: string, required: false }
      - label: "المرفقات"
        name: attachments
        widget: list
        required: false
        fields:
          - { label: "التسمية", name: label, widget: string }
          - { label: "الرابط", name: url, widget: string }
          - { label: "الصيغة", name: format, widget: select, required: false, options: [pdf, epub, docx, zip] }
          - { label: "الحجم (بايت)", name: size_bytes, widget: number, required: false, value_type: int }
      - { label: "المحتوى", name: body, widget: markdown, required: false }
  # annotation (14) + announcement (1) + highlight (2) + term (1) removed from
  # the CMS 2026-07-15 per the same policy — editors work on الكتب + الأعلام
  # only; these tiny collections are edited as markdown files directly.
  # Restore their blocks from git history if CMS editing becomes real.
