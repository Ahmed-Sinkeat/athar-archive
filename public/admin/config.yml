      - { label: "أسماء بديلة (redirects)", name: aliases, widget: list, required: false }
      - { label: "التعريف", name: definition, widget: text, required: false }
      - { label: "المواضيع", name: topics, widget: relation, required: false, multiple: true, collection: topic, search_fields: [title], value_field: "{{slug}}", display_fields: [title] }
      - { label: "أسماء بديلة", name: also_known_as, widget: list, required: false, field: { label: اسم, widget: string } }
      - { label: "المحتوى", name: body, widget: markdown, required: false }
