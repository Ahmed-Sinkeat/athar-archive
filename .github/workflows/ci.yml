name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }} # job-level so the deploy step's `if` can read it
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Validate content (cross-entity, build-fail rules)
        run: pnpm validate:content

      - name: Build (Astro + Pagefind + redirects)
        run: pnpm build

      - name: Smoke test (per-template invariants over dist/)
        run: pnpm smoke

      - name: Link integrity (internal links + redirects resolve over dist/)
        run: pnpm check:links

      - name: Render budget (page weight, JS-free content, RTL over dist/)
        run: pnpm perf:budget

      - name: Type-check
        run: pnpm exec tsc --noEmit --skipLibCheck

      # Auto-deploy to Cloudflare on green main builds. Skipped silently until the
      # CLOUDFLARE_API_TOKEN repo secret is set (so PRs/forks never deploy).
      - name: Deploy to Cloudflare
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
