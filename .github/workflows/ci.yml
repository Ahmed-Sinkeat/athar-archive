name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # astro build opens a remote Cloudflare session to resolve the R2 binding
      # (wrangler.toml's BOOK_ASSETS bucket, remote=true). Deliberately exposes
      # the token to this job's deps, unlike the deploy job below.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Baked into the client bundle at build time (PUBLIC_ prefix), unlike the
      # KEYSTATIC_* secrets which are read at runtime via Cloudflare Worker secrets.
      PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${{ secrets.PUBLIC_KEYSTATIC_GITHUB_APP_SLUG }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Astro data store
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ hashFiles('src/content/**') }}
          restore-keys: astro-

      - name: Unit tests
        run: pnpm test

      - name: Validate content (cross-entity, build-fail rules)
        run: pnpm validate:content

      - name: Build (Astro + Pagefind + redirects)
        run: pnpm build

      # Book/tafsir chapter bodies are served from R2 at request time, not
      # baked into the Worker — without this, new/edited book chapters 404
      # forever no matter how many times you deploy. No diffing (re-puts
      # every file every run, ~9k+ objects) — fine for now, revisit if it
      # ever makes CI painfully slow.
      - name: Upload chapter bodies to R2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        run: pnpm r2:upload

      - name: Smoke test (per-template invariants over dist/)
        run: pnpm smoke

      - name: Link integrity (internal links + redirects resolve over dist/)
        run: pnpm check:links

      - name: Render budget (page weight, JS-free content, RTL over dist/)
        run: pnpm perf:budget

      - name: Type-check
        run: pnpm exec tsc --noEmit --skipLibCheck

      # SQL for the D1 search index → dist/search-index/000.sql (loaded below)
      # Disabled while books are being added in bulk — re-enable (flip `false` to
      # `github.ref == 'refs/heads/main' && github.event_name == 'push'`) once the
      # content additions settle down.
      - name: Generate search index
        if: false
        run: pnpm search:gen

      # ponytail: deploy inline instead of a separate job — the old artifact
      # upload/download step was hitting the repo's Actions storage quota
      # (16.7k files per run). Same job already holds CLOUDFLARE_API_TOKEN
      # for the R2 binding above, so no security separation is lost.
      - name: Deploy to Cloudflare
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json

      # Full reindex ≈ 30k row writes; D1 free allows 100k/day → ~3 deploys/day
      # before this step errors until 00:00 UTC (deploy above still succeeds).
      # Disabled alongside "Generate search index" above — no dist/search-index/
      # to load while that's off.
      - name: Refresh search index (D1)
        if: false
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute athar-search --remote -y --file dist/search-index/000.sql
