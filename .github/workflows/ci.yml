name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deploys must land in commit order — without this, two concurrent runs can
# finish out of order and an older build overwrites a newer deploy. On PRs,
# cancelling a superseded run is fine (nothing user-facing is mid-flight). On
# push to main, cancelling is NOT fine — it can kill an in-progress R2 upload
# mid-way, leaving live pages 404ing until the next push (see 2026-07-17
# incident). A queued-not-cancelled run still lands in order, just without
# killing the one ahead of it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # astro build opens a remote Cloudflare session to resolve the R2 binding
      # (wrangler.toml's BOOK_ASSETS bucket, remote=true). Deliberately exposes
      # the token to this job's deps, unlike the deploy job below.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # ubuntu-latest has 7GB; the corpus outgrew V8's default heap during
      # prerender and search-index generation alike (both OOM'd separately).
      NODE_OPTIONS: --max-old-space-size=6656
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      # ubuntu-latest ships ~30GB of preinstalled SDKs this Node/Astro project
      # never touches (Android, .NET, GHC/Haskell). The corpus's static build
      # (one HTML file per book-page across the whole /book-pages/ tree) grew
      # past the runner's remaining free disk — ENOSPC mid-generate (2026-07-21)
      # — so free that space before the build needs it, same growth pattern
      # that already forced the NODE_OPTIONS heap bump below.
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build-time data (97MB tafsir index etc.) lives in R2, not git LFS —
      # LFS's 1GB/month bandwidth quota kept killing CI; R2 egress is free.
      - name: Fetch build data from R2
        run: pnpm data:fetch

      - name: Cache Astro data store
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ hashFiles('src/content/**') }}
          restore-keys: astro-

      - name: Unit tests
        run: pnpm test

      - name: Validate content (cross-entity, build-fail rules)
        run: pnpm validate:content

      - name: Build (Astro + fragments + redirects)
        run: pnpm build

      - name: Smoke test (per-template invariants over dist/)
        run: pnpm smoke

      - name: Link integrity (internal links + redirects resolve over dist/)
        run: pnpm check:links

      - name: Render budget (page weight, JS-free content, RTL over dist/)
        run: pnpm perf:budget

      - name: Type-check
        run: pnpm exec tsc --noEmit --skipLibCheck

      # Fetch the remote doc_hash table (url→hash) so gen-search-index.ts can
      # diff against it and only emit SQL for docs that actually changed —
      # `|| true` in the pnpm script covers the first-ever run (table doesn't
      # exist yet) by falling back to a full rebuild.
      - name: Fetch search-index hashes
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        run: pnpm search:hashes

      # SQL for the D1 search index → dist/search-index/*.sql (loaded below).
      # Incremental (see gen-search-index.ts): a normal deploy touching a
      # handful of books costs a few hundred row writes, not a 30k-row full
      # reindex, so this can run on every push instead of being gated off.
      - name: Generate search index
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        run: pnpm search:gen

      # ponytail: deploy inline instead of a separate job — the old artifact
      # upload/download step was hitting the repo's Actions storage quota
      # (16.7k files per run). Same job already holds CLOUDFLARE_API_TOKEN
      # for the R2 binding above, so no security separation is lost.
      # Prerendered chapter pages + tafsir fragments are served from R2 at
      # request time (see docs/deploy.md). This MUST run before the Worker
      # deploy and MUST succeed: the pages reference this build's hashed
      # /_astro/*.css files, so deploying the Worker/assets first (or with a
      # half-finished upload) would serve chapters pointing at deleted CSS.
      # Diffs against a remote md5 index (upload-r2-assets.mjs): only changed
      # pages upload. Stored pages carry stable /_astro-live/ placeholders
      # instead of hashed asset URLs (gen-book-chapters.ts §4), so CSS/JS-only
      # changes upload nothing — only real markup/content changes do. The long
      # timeout covers template changes that legitimately dirty every page.
      # Direct S3-API uploads (upload-r2-assets.mjs) — needs the R2 S3
      # credentials below, NOT the wrangler API token. The script fails loudly
      # if they're missing rather than silently skipping (a skipped upload +
      # a deployed Worker = new chapters 404ing).
      - name: Upload chapter pages to R2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        timeout-minutes: 20
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: pnpm r2:upload

      - name: Deploy to Cloudflare
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json

      # Loads whatever gen-search-index.ts produced above — normally a small
      # incremental diff (few hundred writes), occasionally a full rebuild
      # (~30k writes, first run or after a bulk import) against D1's
      # 100k writes/day free quota. gen-search-index.ts caps each SQL file at
      # 5MB specifically so a big diff spans multiple files instead of one
      # remote import stalling out — but this step used to run only
      # dist/search-index/000.sql, a leftover from before that split existed,
      # so any 001.sql+ from a large diff was silently never applied. Loop
      # over every file, same as the local `search:index` pnpm script (which
      # never had this bug — it already loops). continue-on-error: a D1
      # hiccup (auth, quota, transient API error) shouldn't fail the whole CI
      # run when the actual deploy (Worker + R2) above it already succeeded —
      # search goes briefly stale, not the site.
      - name: Refresh search index (D1)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        continue-on-error: true
        run: |
          fail=0
          for f in dist/search-index/*.sql; do
            pnpm exec wrangler d1 execute athar-search --remote -y --file "$f" || { echo "::warning::D1 import failed for $f — continuing to next file"; fail=1; }
          done
          exit $fail

  # Manual-only (workflow_dispatch), independent of the build job above — for
  # merging a book's freshly-extracted per-ayah tafsir notes into the shared
  # build-data/quran-tafsir-index.json on R2 without pulling/pushing a ~100MB
  # file over a contributor's own (possibly metered) connection. Idempotent:
  # gen-tafsir-index-muqatil.ts --merge dedupes by sourceSlug, so re-running
  # this after the index already has a book's notes is a no-op.
  sync-tafsir-index:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Fetch current build data from R2
        run: pnpm data:fetch
      - name: Merge مقاتل بن سليمان's per-ayah tafsir notes
        run: pnpm exec tsx scripts/gen-tafsir-index-muqatil.ts src/content/book-lg/tfsyr-mqatl-bn-slyman.md --merge
      - name: Upload merged index back to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put athar-book-assets/build-data/quran-tafsir-index.json --file src/data/quran-tafsir-index.json --remote

  # Manual-only, runs AFTER sync-tafsir-index (needs:) so the two dispatch jobs
  # can't race on the shared index object. Re-extracts ابن أبي زمنين with the
  # corrected leading-header semantics + content-driven misprint relocation
  # (--replace strips the old systematically-shifted placements first), audits
  # every resulting range against the mushaf (exit 1 blocks the upload), then
  # pushes the fixed index back to R2. Rerun the latest main deploy afterwards
  # so the tafsir fragments regenerate from the fixed index.
  fix-zamanin-index:
    if: github.event_name == 'workflow_dispatch'
    needs: sync-tafsir-index
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Fetch current build data from R2
        run: pnpm data:fetch
      - name: Re-extract ابن أبي زمنين (replace mode)
        run: pnpm exec tsx scripts/gen-tafsir-index-zamanin.ts src/content/book-lg/tafsir-al-quran-al-aziz-ibn-abi-zamanin.md --replace
      - name: Audit every zamanin range against the mushaf
        run: pnpm exec tsx scripts/fix-tafsir-index-zamanin.ts
      - name: Gzip + upload fixed index to R2
        run: gzip -kf src/data/quran-tafsir-index.json
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put athar-book-assets/build-data/quran-tafsir-index.json.gz --file src/data/quran-tafsir-index.json.gz --remote
