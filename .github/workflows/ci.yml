name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # astro build opens a remote Cloudflare session to resolve the R2 binding
      # (wrangler.toml's BOOK_ASSETS bucket, remote=true). Deliberately exposes
      # the token to this job's deps, unlike the deploy job below.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Astro data store
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ hashFiles('src/content/**') }}
          restore-keys: astro-

      - name: Unit tests
        run: pnpm test

      - name: Validate content (cross-entity, build-fail rules)
        run: pnpm validate:content

      - name: Build (Astro + Pagefind + redirects)
        run: pnpm build

      - name: Smoke test (per-template invariants over dist/)
        run: pnpm smoke

      - name: Link integrity (internal links + redirects resolve over dist/)
        run: pnpm check:links

      - name: Render budget (page weight, JS-free content, RTL over dist/)
        run: pnpm perf:budget

      - name: Type-check
        run: pnpm exec tsc --noEmit --skipLibCheck

      # SQL for the D1 search index → dist/search-index/000.sql (loaded by deploy job)
      - name: Generate search index
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm search:gen

      # Hand the built site to the deploy job.
      - name: Upload dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # Separate job: no dependency code runs here, so holding the token is safe.
  # Skips itself (no red ✗) until the CLOUDFLARE_API_TOKEN secret is set.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4 # for wrangler.toml
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Deploy to Cloudflare
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json

      # Full reindex ≈ 30k row writes; D1 free allows 100k/day → ~3 deploys/day
      # before this step errors until 00:00 UTC (deploy above still succeeds).
      - name: Refresh search index (D1)
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute athar-search --remote -y --file dist/search-index/000.sql
