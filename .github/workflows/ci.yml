name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # astro build opens a remote Cloudflare session to resolve the R2 binding
      # (wrangler.toml's BOOK_ASSETS bucket, remote=true). Deliberately exposes
      # the token to this job's deps, unlike the deploy job below.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      # GitHub's free LFS bandwidth is 1 GiB/month; `checkout: lfs: true` was
      # re-downloading the full ~290MB of tracked LFS content on every single
      # push, which is only 3-4 pushes before CI checkouts start failing.
      # actions/cache storage is separate from that quota, so cache the LFS
      # objects keyed on their pointer content (oids) — unchanged files never
      # touch LFS bandwidth again after the first run.
      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS pull
        run: git lfs pull

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Astro data store
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ hashFiles('src/content/**') }}
          restore-keys: astro-

      - name: Unit tests
        run: pnpm test

      - name: Validate content (cross-entity, build-fail rules)
        run: pnpm validate:content

      - name: Build (Astro + Pagefind + redirects)
        run: pnpm build

      - name: Smoke test (per-template invariants over dist/)
        run: pnpm smoke

      - name: Link integrity (internal links + redirects resolve over dist/)
        run: pnpm check:links

      - name: Render budget (page weight, JS-free content, RTL over dist/)
        run: pnpm perf:budget

      - name: Type-check
        run: pnpm exec tsc --noEmit --skipLibCheck

      # Fetch the remote doc_hash table (url→hash) so gen-search-index.ts can
      # diff against it and only emit SQL for docs that actually changed —
      # `|| true` in the pnpm script covers the first-ever run (table doesn't
      # exist yet) by falling back to a full rebuild.
      - name: Fetch search-index hashes
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        run: pnpm search:hashes

      # SQL for the D1 search index → dist/search-index/*.sql (loaded below).
      # Incremental (see gen-search-index.ts): a normal deploy touching a
      # handful of books costs a few hundred row writes, not a 30k-row full
      # reindex, so this can run on every push instead of being gated off.
      - name: Generate search index
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        run: pnpm search:gen

      # ponytail: deploy inline instead of a separate job — the old artifact
      # upload/download step was hitting the repo's Actions storage quota
      # (16.7k files per run). Same job already holds CLOUDFLARE_API_TOKEN
      # for the R2 binding above, so no security separation is lost.
      # Prerendered chapter pages + tafsir fragments are served from R2 at
      # request time (see docs/deploy.md). This MUST run before the Worker
      # deploy and MUST succeed: the pages reference this build's hashed
      # /_astro/*.css files, so deploying the Worker/assets first (or with a
      # half-finished upload) would serve chapters pointing at deleted CSS.
      # Diffs against a remote md5 index (upload-r2-assets.mjs): content-only
      # pushes upload just the changed book's pages (seconds); a design/CSS
      # change re-uploads all ~10k pages (~2.4GB — hence the long timeout).
      - name: Upload chapter pages to R2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        timeout-minutes: 45
        run: pnpm r2:upload

      - name: Deploy to Cloudflare
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c dist/server/wrangler.json

      # Loads whatever gen-search-index.ts produced above — normally a small
      # incremental diff (few hundred writes), occasionally a full rebuild
      # (~30k writes, first run or after a bulk import) against D1's
      # 100k writes/day free quota. continue-on-error: a D1 hiccup (auth,
      # quota, transient API error) shouldn't fail the whole CI run when the
      # actual deploy (Worker + R2) above it already succeeded — search
      # goes briefly stale, not the site.
      - name: Refresh search index (D1)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.CLOUDFLARE_API_TOKEN != ''
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute athar-search --remote -y --file dist/search-index/000.sql
